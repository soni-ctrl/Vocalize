name: Vocalize CI — Build & Release

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'vocalize-android/**'
      - '.github/workflows/build-debug-apk.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'vocalize-android/**'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x vocalize-android/gradlew

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            vocalize-android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('vocalize-android/**/*.gradle*', 'vocalize-android/**/libs.versions.toml', 'vocalize-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle wrapper jar (if not in repo)
        working-directory: vocalize-android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper jar not found — downloading via Gradle."
            gradle wrapper --gradle-version=8.7 --distribution-type=bin
          else
            echo "Wrapper jar already present."
          fi

      - name: Build Debug APK
        working-directory: vocalize-android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get APK info
        id: apk_info
        working-directory: vocalize-android
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "✅ Debug APK: $APK_PATH ($APK_SIZE)"
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocalize-debug-${{ github.run_number }}
          path: vocalize-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 🔥 NEW: Create GitHub Release with DEBUG APK
      - name: Create GitHub Release (Debug APK)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: vocalize-android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        run: |
          echo "## 📦 Vocalize Debug Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run number | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK size | ${{ steps.apk_info.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Debug APK uploaded & used for GitHub Release." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x vocalize-android/gradlew

      - name: Run Lint
        working-directory: vocalize-android
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ github.run_number }}
          path: vocalize-android/app/build/reports/lint-results-debug.html
          retention-days: 14
